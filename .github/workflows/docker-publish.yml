name: docker-publish

# Publishes the controller image to GHCR.
#
# Tagging strategy:
#   - Push to `main`               → `dev`, `main`, `sha-<short>`
#   - Push tag `v0.1.0` (semver)   → `v0.1.0`, `v0.1`, `0`, `latest`
#                                    (the `latest` alias activates only
#                                     for non-prerelease tags)
#   - workflow_dispatch            → `dev`-only (manual rebuild)
#
# Until v0.1.0 ships, every consumer should pin
# `ghcr.io/secrets-bridge/controller:dev` — it's the rolling tag
# pointing at the latest `main` build. Post-v0.1.0, consumers switch
# to either a pinned `vMAJOR.MINOR.PATCH` for reproducibility or
# `latest` for rolling stable.
#
# Multi-arch (linux/amd64 + linux/arm64). First-build cold-cache run
# on a GitHub-hosted runner takes ~15-25 min with QEMU; subsequent
# runs hit the GHA cache and finish in 1-3 min.

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    name: build + push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=sha,format=short,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
          labels: |
            org.opencontainers.image.title=secrets-bridge-controller
            org.opencontainers.image.description=Secrets Bridge Kubernetes operator (CRD reconciler)
            org.opencontainers.image.vendor=secrets-bridge
            org.opencontainers.image.source=https://github.com/secrets-bridge/controller
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ github.ref_type == 'tag' && github.ref_name || github.sha }}

      - name: Output published tags
        run: |
          echo "Published tags:"
          echo "${{ steps.meta.outputs.tags }}"
