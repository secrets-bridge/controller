---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - sync.secrets-bridge.io
  resources:
  - secretssyncs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - sync.secrets-bridge.io
  resources:
  - secretssyncs/finalizers
  verbs:
  - update
- apiGroups:
  - sync.secrets-bridge.io
  resources:
  - secretssyncs/status
  verbs:
  - get
  - patch
  - update
