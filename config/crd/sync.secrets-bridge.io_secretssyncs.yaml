---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: secretssyncs.sync.secrets-bridge.io
spec:
  group: sync.secrets-bridge.io
  names:
    kind: SecretsSync
    listKind: SecretsSyncList
    plural: secretssyncs
    shortNames:
    - ss
    singular: secretssync
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.source.type
      name: Source
      type: string
    - jsonPath: .spec.destination.type
      name: Dest
      type: string
    - jsonPath: .spec.direction
      name: Direction
      type: string
    - jsonPath: .status.syncedCount
      name: Synced
      type: integer
    - jsonPath: .status.failedCount
      name: Failed
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SecretsSync is the Schema for the secretssyncs API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SecretsSyncSpec defines the desired state of a SecretsSync.
            properties:
              conflictStrategy:
                default: SourceWins
                description: |-
                  ConflictStrategy is consulted only when Direction == Bidirectional.
                  Default: SourceWins.
                enum:
                - SourceWins
                - DestinationWins
                - NewestWins
                - Fail
                type: string
              deleteOrphans:
                description: |-
                  DeleteOrphans — when true, secrets that exist on the destination but
                  not on the source (and match the Selector) are deleted from the
                  destination. Only honoured for SourceToDestination.
                  Default: false (safer).
                type: boolean
              destination:
                description: |-
                  Destination is the side secrets are written to (and read from for
                  Bidirectional drift detection).
                properties:
                  config:
                    additionalProperties:
                      type: string
                    description: |-
                      Config is a free-form bag of provider-specific settings (region,
                      endpoint, role to assume, KV mount path, etc.). See each provider's
                      godoc for accepted keys.
                    type: object
                  credentialsSecretRef:
                    description: |-
                      CredentialsSecretRef references a Kubernetes Secret holding any
                      extra credentials the provider needs (PAT, client_secret, etc.).
                      Workload-identity-based auth (IRSA / GCP WI / Azure WI) is preferred
                      and needs no Secret.
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                    required:
                    - name
                    - namespace
                    type: object
                  type:
                    description: Type is the registered provider name.
                    enum:
                    - aws
                    - gcp
                    - azure
                    - vault
                    type: string
                required:
                - type
                type: object
              direction:
                default: SourceToDestination
                description: 'Direction controls the flow. Default: SourceToDestination.'
                enum:
                - SourceToDestination
                - DestinationToSource
                - Bidirectional
                type: string
              refreshInterval:
                default: 5m
                description: |-
                  RefreshInterval is how often the controller re-reconciles even when
                  there are no Kubernetes events. Use a duration string like "5m".
                  Default: "5m".
                type: string
              selector:
                description: Selector narrows which secrets are in scope.
                properties:
                  excludePrefixes:
                    description: |-
                      ExcludePrefixes — never sync secret names with any of these prefixes.
                      Evaluated after IncludePrefixes.
                    items:
                      type: string
                    type: array
                  includePrefixes:
                    description: |-
                      IncludePrefixes — only sync secret names with at least one of these prefixes.
                      Empty means "include everything".
                    items:
                      type: string
                    type: array
                type: object
              source:
                description: Source is the side secrets are read from.
                properties:
                  config:
                    additionalProperties:
                      type: string
                    description: |-
                      Config is a free-form bag of provider-specific settings (region,
                      endpoint, role to assume, KV mount path, etc.). See each provider's
                      godoc for accepted keys.
                    type: object
                  credentialsSecretRef:
                    description: |-
                      CredentialsSecretRef references a Kubernetes Secret holding any
                      extra credentials the provider needs (PAT, client_secret, etc.).
                      Workload-identity-based auth (IRSA / GCP WI / Azure WI) is preferred
                      and needs no Secret.
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                    required:
                    - name
                    - namespace
                    type: object
                  type:
                    description: Type is the registered provider name.
                    enum:
                    - aws
                    - gcp
                    - azure
                    - vault
                    type: string
                required:
                - type
                type: object
            required:
            - destination
            - source
            type: object
          status:
            description: SecretsSyncStatus defines the observed state of a SecretsSync.
            properties:
              conditions:
                description: |-
                  Conditions follows the standard k8s convention. Type "Ready" means
                  the last reconcile completed without error.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              failedCount:
                description: FailedCount is the number of secrets that failed on the
                  last reconcile.
                format: int32
                type: integer
              lastReconcileTime:
                description: LastReconcileTime is when the controller last ran (regardless
                  of outcome).
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the spec.generation last reconciled.
                format: int64
                type: integer
              results:
                description: |-
                  Results is a per-secret breakdown. Capped to avoid unbounded growth;
                  excess entries are summarised in metrics.
                items:
                  description: SecretSyncResult is a per-secret status entry surfaced
                    in Status.Results.
                  properties:
                    lastSyncTime:
                      description: LastSyncTime is when the reconciler last touched
                        this secret.
                      format: date-time
                      type: string
                    message:
                      description: Message is human-readable detail (error text on
                        Failed).
                      type: string
                    name:
                      description: Name is the canonical secret name.
                      type: string
                    phase:
                      description: Phase is one of Synced, Skipped, Failed.
                      type: string
                  required:
                  - name
                  - phase
                  type: object
                type: array
              syncedCount:
                description: SyncedCount is the number of secrets currently in sync.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
